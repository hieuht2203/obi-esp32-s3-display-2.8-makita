; PlatformIO Project Configuration for OBI ESP32
;
; Open Battery Information - ESP32-C3 Super Mini version
; Communicates with Makita LXT batteries via modified OneWire protocol
;
; Hardware:esp32c3
;   - OneWire Data: GPIO3
;   - Enable Pin: GPIO4
;   - Pull-up resistors: 4.7kΩ to 3.3V on both data lines

; Hardware:esp32s3
;   - OneWire Data: GPIO2
;   - Enable Pin: GPIO3
;   - Pull-up resistors: 4.7kΩ to 3.3V on both data lines

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; MCU settings
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_build.f_flash = 80000000L

; Build flags - USB CDC and pin definitions
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DONEWIRE_PIN=3
    -DENABLE_PIN=4

; Monitor settings
monitor_port = /dev/ttyACM0
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder

; Upload settings
upload_speed = 921600
upload_port = /dev/ttyACM0

; Library dependencies
lib_deps =
    ; Web server for Phase 2
    ; me-no-dev/ESPAsyncWebServer @ ^1.2.3

[env:esp32c3_web]
extends = env:esp32c3
build_flags =
    ${env:esp32c3.build_flags}
    -DENABLE_WEB_SERVER=1

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; OTA upload environment - use after initial USB flash
[env:esp32c3_ota]
extends = env:esp32c3_web
upload_protocol = espota
upload_port = 192.168.25.110

; =========================================================
; ESP32-S3 Super Mini configurations
; =========================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

; MCU settings
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.f_flash = 80000000L

; Build flags - USB CDC and pin definitions
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DONEWIRE_PIN=2
    -DENABLE_PIN=3

; Monitor settings
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder

; Upload settings
upload_speed = 921600

[env:esp32s3_web]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DENABLE_WEB_SERVER=1

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32s3_ota]
extends = env:esp32s3_web
upload_protocol = espota
upload_port = 192.168.25.110

[env:esp32s3_display]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DENABLE_DISPLAY=1
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_BL=45
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DTOUCH_SDA=16
    -DTOUCH_SCL=15
    -DTOUCH_RST=18
    -DTOUCH_INT=17
    -DRGB_LED_PIN=42
    -DSD_CLK=38
    -DSD_CMD=40
    -DSD_D0=39
    -DSD_D1=41
    -DSD_D2=48
    -DSD_D3=47
    -DSPI_FREQUENCY=20000000
    -DSPI_READ_FREQUENCY=16000000
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
